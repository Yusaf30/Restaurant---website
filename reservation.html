<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve a Table</title>
</head>

<body>
    <main>
        <div>
            <h1>Reserve a Table</h1>
            <p>Planning to visit us? Reserve your table in advance
                to enjoy a comfortable dining experience without waiting.</p>
        </div>
        <div>
            <div>
                <label for="full-name">Full Name: </label>
                <input id="full-name" type="text" placeholder="Enter Your Full Name">
            </div>
            <div>
                <label for="email-add">Email Address: </label>
                <input type="email" name="" id="email-add" placeholder="abc@gmail.com">
            </div>
            <div>
                <label for="phn-numbr">Phone Number: </label>
                <input type="text" name="" id="phn-numbr" >
            </div>
            <div>
                <label for="no-of-guest">Number of Guests</label>
                <input type="number" name="" id="no-of-guest">
            </div>
            <div>
                <label for="reservation">Reservation Date: </label>
                <input type="datetime-local" name="" id="reservation">
            </div>
            <div>
                <label for="spl-req">Special Requests</label>
                <textarea name="" id="spl-req"></textarea>
            </div>
            <input type="button" value="Reserve Now">
        </div>
    </main>

</body>

</html>
